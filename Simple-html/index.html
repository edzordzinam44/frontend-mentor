<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A qr code simple html to scan">
    <link rel="icon" type="x/icon" href="./favicon-32x32.png">
    <title>QR code</title>
    <link href="https://fonts.google.com/specimen/Outfit">
    <link rel="stylesheet" href="./index.css">
</head>

<body>
    <div class="wrapper">
        <div class="container">
            <div class="qr-code"><img src="Qr-code.png" alt="QR Code"></div>
            <div class="wrapper-header">
                <p>Improve your front-end skills by building projects</p>
            </div>
            <span class="section-tab">Scan the QR Code to visit Front-end Mentor and take your coding skills to the next
                Level.
            </span>
        </div>
    </div>
</body>

</html>
